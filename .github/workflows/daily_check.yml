name: 🐊 大鱷足跡每日監控

# 1. 觸發條件
on:
  schedule:
    # 原本是 '30 6' (14:30)，現在我們改為 '30 5' (台灣時間 13:30)
    # 這樣即使排隊 60 分鐘，也能在 14:30 左右準時「開獎」
    - cron: '30 5 * * 1-5'
  
  workflow_dispatch: # 保留這個，讓你隨時想測就能測

# 2. 執行的內容
jobs:
  build:
    runs-on: ubuntu-latest # 使用雲端虛擬主機

    steps:
      - name: 📥 複製倉庫檔案
        uses: actions/checkout@v6

      - name: 安裝 Python 環境
        uses: actions/setup-python@v6 # 或是 v6
        with:
          python-version: '3.10'

      - name: 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 執行 VSA 監工腳本
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python vsa_monitor.py
